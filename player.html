<div id="video-wrapper"
style="max-width:1900px;margin:0 auto;position:relative;padding-bottom:56.25%;height:0;overflow:hidden;font-family:Roboto, sans-serif;">

<!-- Video ID here-->
<div id="player" data-video-id="xNN7iTA57jM"
style="position:absolute;top:0;left:0;width:100%;height:100%;z-index:1;"></div>

<!-- OVERLAY -->
<div id="overlay"
style="position:absolute;top:0;left:0;width:100%;height:100%;cursor:pointer;z-index:2;"></div>

<!-- CONTROLS -->
<div id="controlsBar"
style="position:absolute;bottom:0;left:0;width:100%;
background:black;padding:12px 16px;box-sizing:border-box;
z-index:9999;display:flex;align-items:center;gap:12px;">

<button id="playPauseBtn"
style="background:none;color:white;border:none;font-size:20px;cursor:pointer;">▶</button>

<span id="timeDisplay" style="color:white;font-size:13px;">0:00 / 0:00</span>

<!-- PROGRESS -->
<div id="progressContainer"
style="flex:1;height:6px;background:#444;cursor:pointer;position:relative;border-radius:4px;">

<div id="progressBar"
style="height:100%;width:0;background:red;position:relative;border-radius:4px;">
<div style="position:absolute;right:-6px;top:50%;transform:translateY(-50%);
width:12px;height:12px;background:white;border-radius:50%;"></div>
</div>

<div id="previewTime"
style="position:absolute;bottom:14px;left:0;transform:translateX(-50%);
background:black;color:white;font-size:12px;padding:3px 6px;border-radius:4px;display:none;">
</div>

</div>

<!-- VOLUME -->
<div style="display:flex;align-items:center;gap:6px;">
<button id="volumeBtn" style="background:none;border:none;cursor:pointer;">
<svg width="20" height="20" viewBox="0 0 24 24" fill="white">
<path d="M3 9v6h4l5 5V4L7 9H3z"/>
<path id="volumeWave"
d="M14 3.23v2.06c2.89 1 5 3.77 5 6.71s-2.11 5.71-5 6.71v2.06c4.01-1.05 7-4.71 7-8.77s-2.99-7.72-7-8.77z"/>
</svg>
</button>

<input id="volumeSlider" type="range" min="0" max="100" value="100" style="width:80px;">
</div>

<!-- RIGHT -->
<div style="margin-left:auto;display:flex;gap:10px;align-items:center;flex-shrink:0;">

<button id="settingsBtn"
style="background:none;border:none;color:white;font-size:18px;cursor:pointer;">⚙</button>

<button id="fullscreenBtn"
style="background:none;border:none;color:white;font-size:18px;cursor:pointer;">⛶</button>

</div>

</div>

<!-- MENU -->
<div id="settingsMenu"
style="display:none;position:absolute;bottom:60px;right:20px;background:#1f1f1f;color:white;border-radius:10px;padding:10px;width:220px;z-index:9999;">

<div id="mainMenu">
<div id="btnSpeed" style="padding:8px;cursor:pointer;">Velocidade ▶</div>
<div id="btnQuality" style="padding:8px;cursor:pointer;">Qualidade ▶</div>
</div>

<div id="speedMenu" style="display:none;">
<div class="back" style="padding:8px;cursor:pointer;">◀ Voltar</div>
<div class="speedBtn" data-speed="1" style="padding:8px;">Normal</div>
<div class="speedBtn" data-speed="1.5" style="padding:8px;">1.5x</div>
<div class="speedBtn" data-speed="2" style="padding:8px;">2x</div>
</div>

<div id="qualityMenu" style="display:none;">
<div class="back" style="padding:8px;cursor:pointer;">◀ Voltar</div>
<div class="qualityBtn" data-quality="hd1080" style="padding:8px;">1080p</div>
<div class="qualityBtn" data-quality="hd720" style="padding:8px;">720p</div>
<div class="qualityBtn" data-quality="large" style="padding:8px;">480p</div>
</div>

</div>

</div>

<!-- CSS (AFTER PLAYER  - IMPORTANT IN WIX) -->
<style>
#volumeSlider {
  -webkit-appearance:none;
  appearance:none;
  height:4px;
  background:white;
}
#volumeSlider::-webkit-slider-thumb {
  -webkit-appearance:none;
  width:12px;height:12px;background:white;border-radius:50%;
}
#volumeSlider::-moz-range-thumb {
  width:12px;height:12px;background:white;border-radius:50%;
}
</style>

<script src="https://www.youtube.com/iframe_api"></script>

<script>
let player;

function formatTime(s){
const m=Math.floor(s/60);
const sec=Math.floor(s%60);
return m+":"+(sec<10?"0":"")+sec;
}

function onYouTubeIframeAPIReady(){
player=new YT.Player('player',{
videoId:document.getElementById('player').dataset.videoId,
playerVars:{controls:0,rel:0,modestbranding:1,playsinline:1},
events:{onReady:init}
});
}

function init(){

const overlay=document.getElementById('overlay');
const playBtn=document.getElementById('playPauseBtn');
const fsBtn=document.getElementById('fullscreenBtn');
const settingsBtn=document.getElementById('settingsBtn');
const menu=document.getElementById('settingsMenu');

const progressBar=document.getElementById('progressBar');
const progressContainer=document.getElementById('progressContainer');
const preview=document.getElementById('previewTime');
const timeDisplay=document.getElementById('timeDisplay');

const volume=document.getElementById('volumeSlider');
const volumeBtn=document.getElementById('volumeBtn');
const volumeWave=document.getElementById('volumeWave');

// BLOCK
overlay.oncontextmenu=e=>e.preventDefault();

// PLAY
function togglePlay(){
if(player.getPlayerState()==1){
player.pauseVideo();
playBtn.innerHTML="▶";
}else{
player.playVideo();
playBtn.innerHTML="⏸";
}
}

overlay.onclick=togglePlay;
playBtn.onclick=e=>{e.stopPropagation();togglePlay();};

// FULLSCREEN
fsBtn.onclick=()=>{
const w=document.getElementById('video-wrapper');
if(!document.fullscreenElement) w.requestFullscreen();
else document.exitFullscreen();
};

document.addEventListener("fullscreenchange",()=>{
fsBtn.innerHTML=document.fullscreenElement?"⤡":"⛶";
});

// MENU
settingsBtn.onclick=(e)=>{
e.stopPropagation();
menu.style.display = menu.style.display==="none"?"block":"none";
};

//  SUBMENU
const mainMenu = document.getElementById('mainMenu');
const speedMenu = document.getElementById('speedMenu');
const qualityMenu = document.getElementById('qualityMenu');

document.getElementById('btnSpeed').onclick = () => {
mainMenu.style.display="none";
speedMenu.style.display="block";
};

document.getElementById('btnQuality').onclick = () => {
mainMenu.style.display="none";
qualityMenu.style.display="block";
};

document.querySelectorAll('.back').forEach(btn=>{
btn.onclick=()=>{
speedMenu.style.display="none";
qualityMenu.style.display="none";
mainMenu.style.display="block";
};
});

document.querySelectorAll('.speedBtn').forEach(btn=>{
btn.onclick=()=>{
player.setPlaybackRate(parseFloat(btn.dataset.speed));
document.querySelectorAll('.speedBtn').forEach(b=>b.style.background="transparent");
btn.style.background="#555";
};
});

document.querySelectorAll('.qualityBtn').forEach(btn=>{
btn.onclick=()=>{
player.setPlaybackQuality(btn.dataset.quality);
document.querySelectorAll('.qualityBtn').forEach(b=>b.style.background="transparent");
btn.style.background="#555";
};
});

// PROGRESS
setInterval(()=>{
let d=player.getDuration();
let c=player.getCurrentTime();
if(d>0){
progressBar.style.width=(c/d)*100+"%";
timeDisplay.innerText=formatTime(c)+" / "+formatTime(d);
}
},500);

// SEEK
progressContainer.onclick=e=>{
let r=progressContainer.getBoundingClientRect();
let p=(e.clientX-r.left)/r.width;
player.seekTo(p*player.getDuration(),true);
};

// PREVIEW
progressContainer.onmousemove=e=>{
let r=progressContainer.getBoundingClientRect();
let p=(e.clientX-r.left)/r.width;
preview.style.display="block";
preview.style.left=(p*100)+"%";
preview.innerText=formatTime(p*player.getDuration());
};
progressContainer.onmouseleave=()=>preview.style.display="none";

// VOLUME
volume.oninput=()=>{
player.setVolume(volume.value);
volumeWave.style.display = volume.value==0?"none":"block";
};

volumeBtn.onclick=(e)=>{
e.stopPropagation();
if(player.isMuted()||volume.value==0){
player.unMute();
volume.value=100;
}else{
player.mute();
volume.value=0;
}
volumeWave.style.display = volume.value==0?"none":"block";
};

}
</script>
